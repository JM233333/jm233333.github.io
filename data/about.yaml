profile:
  handle: JM233333
  name: Hanzhi Liu
  native_name: 刘瀚之
  role:
    en: "Ph.D. candidate, Nanjing University"
    zh-cn: "南京大学博士研究生"
  email: jm233333@outlook.com
  bio:
    en: >
      I'm a fourth-year Ph.D. candidate in [SPAR](http://ics.nju.edu.cn/spar/)
      Group of Institute of Computer Software, Nanjing University, supervised by
      Assoc. Prof. [Yanyan Jiang](https://ics.nju.edu.cn/~jyy/) and Prof.
      [Chang Xu](https://cs.nju.edu.cn/changxu/). Currently my research focuses
      on understanding and debugging operating system kernels and other system
      software. I'm also interested in system reliability and observability, as
      well as designing systems that can solve critical real-world problems.
    zh-cn: >
      我是南京大学计算机软件研究所 [SPAR](http://ics.nju.edu.cn/spar/) 小组的四年级博士生，
      导师是[蒋炎岩副教授](https://ics.nju.edu.cn/~jyy/)和[许畅教授](https://cs.nju.edu.cn/changxu/)。
      目前我的主要研究方向是操作系统内核和其他系统软件的调试和理解；我还有志于系统软件的可靠性与可观测性，
      以及设计能够解决现实世界重大问题的系统。
